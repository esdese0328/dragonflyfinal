
services:
  #API Server
  api_server:
    build: ./api_server
    container_name: api_server
    ports:
      - "8000:8000"
    volumes:
      - ./api_server:/app
    networks:
      - dragonfly_net
  
# File Server  提供原始測試檔, 供 worker 下載
  file-server:
    build: ./file_server
    container_name: file-server      # worker 預設 FILE_SERVER=http://file-server
    ports:
      - "8800:80"                    # 可選: 本機用 http://localhost:8800 驗證 (8071-8770 被 Windows 保留)
    networks:
      - dragonfly_net

  #Scheduler 排程器
  scheduler:
    build: ./scheduler
    container_name: scheduler
    environment:
      - API_URL=http://api_server:8000
      - SCAN_INTERVAL=3
      - HEARTBEAT_TIMEOUT=15
      - MAX_RETRY=3
      - STRATEGY=round-robin
      - PYTHONUNBUFFERED=1
    volumes:
      - ./scheduler:/app
    networks:
      - dragonfly_net
    depends_on:
      - api_server

  dashboard:
    build: ./dashboard
    container_name: dashboard
    ports:
      - "9001:8501"
    volumes:
      - ./dashboard:/app
    networks:
      - dragonfly_net
    depends_on:
      - api_server

  # Worker / Downloader (第 5 人)
  worker:
    build: ./worker
    volumes:
      - ./worker:/app
    environment:
      API_URL: "http://api_server:8000"
      WORKER_NAME: "Worker-Node"
      DOWNLOAD_MODE: "auto"
      SELF_ASSIGN: "0"   # 已對接第 4 人 Scheduler，指派交由 Scheduler 統一負責
    networks:
      - dragonfly_net
    depends_on:
      - api_server
    # 想模擬多個 Worker 時可改用 docker-compose up --scale worker=3
    # (使用 scale 時請把上面的 container_name 留空，本服務已無 container_name)

networks:
  dragonfly_net:
    driver: bridge