
services:
  #API Server
  api_server:
    build: ./api_server
    container_name: api_server
    ports:
      - "8000:8000"
    volumes:
      - ./api_server:/app
    networks:
      - dragonfly_net
  
# File Server  提供原始測試檔, 供 worker 下載
  file-server:
    build: ./file_server
    container_name: file-server      # worker 預設 FILE_SERVER=http://file-server
    ports:
      - "8080:80"                    # 可選: 本機用 http://localhost:8080 驗證
    networks:
      - dragonfly_net

  dashboard:
    build: ./dashboard
    container_name: dashboard
    ports:
      - "9001:8501"
    volumes:
      - ./dashboard:/app
    networks:
      - dragonfly_net
    depends_on:
      - api_server

  # Worker / Downloader (第 5 人)
  worker:
    build: ./worker
    volumes:
      - ./worker:/app
    environment:
      API_URL: "http://api_server:8000"
      WORKER_NAME: "Worker-Node"
      DOWNLOAD_MODE: "auto"
      SELF_ASSIGN: "1"   # 還沒有 Scheduler 時自我指派；對接第 4 人後改為 "0"
    networks:
      - dragonfly_net
    depends_on:
      - api_server
    # 想模擬多個 Worker 時可改用 docker-compose up --scale worker=3
    # (使用 scale 時請把上面的 container_name 留空，本服務已無 container_name)

networks:
  dragonfly_net:
    driver: bridge